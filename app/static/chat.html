<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca do Felipe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: only light;
      --ink: #1d1308;
      --ink-soft: #3a2512;
      --paper: rgba(238, 208, 149, 0.92);
      --paper-strong: rgba(222, 186, 121, 0.97);
      --paper-dark: rgba(188, 140, 84, 0.95);
      --border: #6c4320;
      --shadow: rgba(34, 18, 7, 0.42);
      --panel-width: min(920px, calc(100vw - 40px));
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "VT323", monospace;
      background:
        linear-gradient(rgba(40, 20, 8, 0.48), rgba(40, 20, 8, 0.62)),
        url("/chat/background") center center / cover no-repeat fixed;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .chat-shell {
      width: var(--panel-width);
      height: min(780px, calc(100vh - 40px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      border: 4px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background:
        linear-gradient(rgba(255, 241, 205, 0.18), rgba(128, 80, 27, 0.08)),
        var(--paper);
      box-shadow:
        0 24px 60px var(--shadow),
        inset 0 0 0 2px rgba(255, 237, 188, 0.5);
      backdrop-filter: blur(2px);
    }

    .header {
      padding: 20px 24px 16px;
      border-bottom: 3px solid rgba(108, 67, 32, 0.55);
      background: linear-gradient(rgba(250, 231, 185, 0.72), rgba(212, 171, 106, 0.82));
    }

    .header h1 {
      margin: 0 0 10px;
      color: var(--ink);
      font-family: "Silkscreen", monospace;
      font-size: clamp(1rem, 2vw, 1.45rem);
      line-height: 1.4;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .header p {
      margin: 0;
      color: var(--ink-soft);
      font-size: 1.95rem;
      line-height: 1.15;
    }

    .messages {
      overflow-y: auto;
      padding: 22px 22px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .message {
      padding: 14px 16px;
      border: 3px solid var(--border);
      border-radius: 14px;
      line-height: 1.15;
      white-space: pre-wrap;
      font-size: 1.95rem;
      box-shadow: 4px 4px 0 rgba(77, 46, 18, 0.22);
    }

    .message.user {
      background: var(--paper-dark);
      color: var(--ink);
      align-self: flex-end;
      max-width: 80%;
    }

    .message.assistant {
      background: rgba(247, 226, 178, 0.96);
      color: var(--ink);
      align-self: flex-start;
      max-width: 85%;
    }

    .message.thinking {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      min-width: 72px;
    }

    .thinking-dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 18px;
    }

    .thinking-dots span {
      width: 10px;
      height: 10px;
      background: var(--ink-soft);
      opacity: 0.35;
      animation: thinkingPulse 1.2s infinite ease-in-out;
      box-shadow: 1px 1px 0 rgba(255, 233, 188, 0.5);
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes thinkingPulse {
      0%, 80%, 100% {
        opacity: 0.35;
        transform: translateY(0);
      }

      40% {
        opacity: 1;
        transform: translateY(-2px);
      }
    }

    .composer {
      border-top: 3px solid rgba(108, 67, 32, 0.55);
      padding: 18px 20px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      background: linear-gradient(rgba(242, 217, 164, 0.92), rgba(205, 164, 101, 0.95));
    }

    textarea {
      resize: none;
      min-height: 84px;
      max-height: 180px;
      padding: 14px 16px;
      border-radius: 14px;
      border: 3px solid var(--border);
      background: rgba(255, 242, 208, 0.92);
      color: var(--ink);
      font: inherit;
      font-size: 1.8rem;
      line-height: 1.1;
      outline: none;
      box-shadow: inset 0 0 0 1px rgba(255, 236, 187, 0.45);
    }

    textarea::placeholder {
      color: rgba(58, 37, 18, 0.75);
    }

    textarea:focus {
      box-shadow:
        inset 0 0 0 1px rgba(255, 236, 187, 0.45),
        0 0 0 3px rgba(161, 103, 41, 0.16);
    }

    button {
      border: 3px solid var(--border);
      border-radius: 14px;
      min-width: 128px;
      padding: 0 18px;
      background: linear-gradient(#f0c76f, #c98c34);
      color: var(--ink);
      font-family: "Silkscreen", monospace;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 4px 4px 0 rgba(77, 46, 18, 0.24);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    button:hover:not(:disabled) {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      .chat-shell {
        height: calc(100vh - 24px);
        width: calc(100vw - 24px);
      }

      .header h1 {
        font-size: 0.9rem;
      }

      .header p,
      .message,
      textarea {
        font-size: 1.55rem;
      }

      .composer {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 56px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="chat-shell">
      <section class="header">
        <h1>Biblioteca do Felipe</h1>
        <p>Atendimento da biblioteca</p>
      </section>

      <div id="messages" class="messages"></div>

      <form id="chat-form" class="composer">
        <textarea id="message-input" placeholder="Exemplo: liste os livros disponíveis"></textarea>
        <button id="send-button" type="submit">Enviar</button>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("chat-form");
    const input = document.getElementById("message-input");
    const messagesEl = document.getElementById("messages");
    const sendButton = document.getElementById("send-button");

    const history = [];

    function addMessage(role, content) {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;
      wrapper.textContent = content;

      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addThinkingMessage() {
      const wrapper = document.createElement("div");
      wrapper.className = "message assistant thinking";
      wrapper.id = "thinking-message";
      wrapper.setAttribute("aria-label", "Assistente pensando");

      const dots = document.createElement("div");
      dots.className = "thinking-dots";
      dots.innerHTML = "<span></span><span></span><span></span>";

      wrapper.appendChild(dots);
      messagesEl.appendChild(wrapper);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeThinkingMessage() {
      const thinkingMessage = document.getElementById("thinking-message");
      if (thinkingMessage) {
        thinkingMessage.remove();
      }
    }

    addMessage(
      "assistant",
      "Olá. Posso ajudar com usuários, livros, empréstimos, devoluções, renovações e reservas."
    );

    input.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        form.requestSubmit();
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = input.value.trim();
      if (!message) {
        return;
      }

      sendButton.disabled = true;
      addMessage("user", message);
      history.push({ role: "user", content: message });
      input.value = "";
      addThinkingMessage();

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            history: history.slice(0, -1),
          }),
        });

        const data = await response.json();
        removeThinkingMessage();
        addMessage("assistant", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch (error) {
        removeThinkingMessage();
        addMessage(
          "assistant",
          "Verifique se a API está em execução."
        );
      } finally {
        sendButton.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
